<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>KeyFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KeyFlow" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon-apple.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="bar">
    <span id="status" class="status">…</span>
    <span id="ver" class="ver">v?</span>
  </header>

  <div class="cursor-overlay" id="cursor-overlay">
    ↑↓←→&nbsp; カーソル移動中<br>
    <small>指を離すと終了</small>
  </div>

  <main class="grid" id="grid">
    <!-- Row 1: symbols -->
    <button class="btn op"  data-type="char" data-value="%">%</button>
    <button class="btn op"  data-type="char" data-value="/">/</button>
    <button class="btn op"  data-type="char" data-value="+">+</button>
    <button class="btn op"  data-type="char" data-value="-">-</button>

    <!-- Row 2 -->
    <button class="btn"     data-type="char" data-value="7">7</button>
    <button class="btn"     data-type="char" data-value="8">8</button>
    <button class="btn"     data-type="char" data-value="9">9</button>
    <button class="btn act" data-type="key"  data-value="tab">Tab</button>

    <!-- Row 3 -->
    <button class="btn"     data-type="char" data-value="4">4</button>
    <button class="btn"     data-type="char" data-value="5">5</button>
    <button class="btn"     data-type="char" data-value="6">6</button>
    <button class="btn act" data-type="key"  data-value="backspace">⌫</button>

    <!-- Row 4: col 1-3 (col 4 = top half of Enter) -->
    <button class="btn"     data-type="char" data-value="1">1</button>
    <button class="btn"     data-type="char" data-value="2">2</button>
    <button class="btn"     data-type="char" data-value="3">3</button>

    <!-- Row 5: col 1-3 (col 4 = bottom half of Enter) -->
    <button class="btn"     data-type="char" data-value="0">0</button>
    <button class="btn"     data-type="char" data-value="00">00</button>
    <button class="btn"     data-type="char" data-value=".">.</button>

    <!-- Enter: spans col 4, rows 4-5 via CSS -->
    <button class="btn enter" data-type="key" data-value="enter">Enter</button>
  </main>

  <script src="/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
