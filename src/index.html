<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>KeyFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 起動中 -->
  <div id="waiting">
    <div class="spinner"></div>
    <p>起動中…</p>
  </div>

  <!-- アクセシビリティ未許可 -->
  <div id="setup">
    <div class="setup-icon">🔐</div>
    <h2>初回設定</h2>
    <p class="setup-desc">
      キー入力を送るには<br>
      <strong>アクセシビリティ</strong>の許可が必要です
    </p>
    <ol class="setup-steps">
      <li>「設定を開く」をクリック</li>
      <li>一覧に KeyFlow があれば <strong>「−」で削除</strong></li>
      <li>「＋」で <strong>KeyFlow</strong> を追加</li>
      <li>スイッチを <strong>オン</strong> にする</li>
    </ol>
    <div class="setup-btns">
      <button id="btn-open-settings">設定を開く →</button>
      <button id="btn-check" class="secondary">許可した ✓</button>
    </div>
    <p id="setup-err" class="setup-err"></p>
  </div>

  <!-- QR 表示 -->
  <div id="ready">
    <h1>カメラで読み込んで接続</h1>
    <div class="qr-row">
      <div class="qr-card" id="ios-card">
        <div class="platform-label">🍎 iPhone</div>
        <div class="qr-wrap"><img id="ios-qr" alt="iPhone QR" /></div>
        <p class="qr-url" id="ios-url"></p>
        <p class="qr-hint">ホーム画面追加に最適</p>
      </div>
      <div class="qr-card" id="android-card">
        <div class="platform-label">🤖 Android</div>
        <div class="qr-wrap"><img id="android-qr" alt="Android QR" /></div>
        <p class="qr-url" id="android-url"></p>
        <p class="qr-hint">Chrome で開く</p>
      </div>
    </div>
    <p class="global-hint">同じ Wi-Fi に繋いでください</p>
    <p class="app-version" id="app-version"></p>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const screens = { waiting: $('waiting'), setup: $('setup'), ready: $('ready') };

    function showScreen(name) {
      Object.entries(screens).forEach(([k, el]) => {
        el.style.display = k === name ? 'flex' : 'none';
      });
    }
    showScreen('waiting');

    // ── アクセシビリティ確認 ──────────────────────────────────────
    async function checkA11y() {
      try {
        const ok = await window.numpad.getAccessibility();
        if (ok) {
          showScreen('waiting');
          loadQR();
        } else {
          showScreen('setup');
        }
      } catch {
        // IPC エラー時は安全のためセットアップ画面を表示
        showScreen('setup');
      }
    }

    $('btn-open-settings').addEventListener('click', () => {
      window.numpad.openAccessibility();
    });

    $('btn-check').addEventListener('click', () => {
      // macOS はアクセシビリティ許可後すぐに状態を更新しないことがある。
      // 最大 10 秒間 500ms ごとにポーリングして遷移する。
      const btn = $('btn-check');
      const errEl = $('setup-err');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = '確認中…';

      const deadline = Date.now() + 10000;
      const poll = async () => {
        const ok = await window.numpad.getAccessibility().catch(() => false);
        if (ok) {
          btn.disabled = false;
          btn.textContent = '許可した ✓';
          checkA11y();
          return;
        }
        if (Date.now() < deadline) {
          setTimeout(poll, 500);
        } else {
          btn.disabled = false;
          btn.textContent = '許可した ✓';
          errEl.textContent = 'まだ許可されていません。スイッチがオンか確認してください。';
        }
      };
      poll();
    });

    // ── QR 表示 ──────────────────────────────────────────────────
    function showQR(info) {
      if (!info) return;
      showScreen('ready');
      const fill = (card, imgEl, urlEl, data) => {
        card.style.display = data ? 'flex' : 'none';
        if (data) {
          imgEl.src = data.qr;
          urlEl.textContent = data.url
            .replace(/^https?:\/\//, '')
            .replace(/\/\?t=.+/, '');
        }
      };
      fill($('ios-card'),     $('ios-qr'),     $('ios-url'),     info.ios);
      fill($('android-card'), $('android-qr'), $('android-url'), info.android);
    }

    function loadQR() {
      // onInfo を先に登録してから現在の状態を取得する
      window.numpad.onInfo(showQR);
      window.numpad.getInfo().then(info => {
        if (info) { showQR(info); return; }
        // サーバー起動待ち：1秒ごとにリトライ（最大15秒）
        const iv = setInterval(async () => {
          const i = await window.numpad.getInfo();
          if (i) { showQR(i); clearInterval(iv); }
        }, 1000);
        setTimeout(() => clearInterval(iv), 15000);
      });
    }

    // ── バージョン表示 ────────────────────────────────────────────
    window.numpad.getVersion().then(v => {
      $('app-version').textContent = 'v' + v;
    });

    // ── 起動シーケンス ────────────────────────────────────────────
    checkA11y();
  </script>
</body>
</html>
